<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="oklch(0.13 0.014 250)"/>
  <g transform="translate(64,64)">
    <defs>
      <radialGradient id="pn" cx="40%" cy="35%" r="50%">
        <stop offset="0%" stop-color="oklch(0.82 0.08 250)"/>
        <stop offset="100%" stop-color="oklch(0.55 0.12 250)"/>
      </radialGradient>
    </defs>
    <!-- Planet body -->
    <circle r="20" fill="url(#pn)"/>
    <!-- Ring behind planet -->
    <ellipse rx="40" ry="11" fill="none" stroke="oklch(0.74 0.07 250)" stroke-width="2" opacity="0.25" transform="rotate(-20)"/>
    <!-- Ring front -->
    <clipPath id="fn">
      <rect x="-50" y="0" width="100" height="50" transform="rotate(-20)"/>
    </clipPath>
    <ellipse rx="40" ry="11" fill="none" stroke="oklch(0.74 0.07 250)" stroke-width="2" opacity="0.65" transform="rotate(-20)" clip-path="url(#fn)"/>
    <!-- Inner ring -->
    <ellipse rx="32" ry="8.5" fill="none" stroke="oklch(0.72 0.10 162)" stroke-width="0.8" opacity="0.3" transform="rotate(-20)"/>
    <!-- Trust nodes on ring -->
    <circle cx="38" cy="-4" r="3" fill="oklch(0.74 0.07 250)" opacity="0.85" transform="rotate(-20)"/>
    <circle cx="-38" cy="4" r="3" fill="oklch(0.74 0.07 250)" opacity="0.85" transform="rotate(-20)"/>
    <circle cx="20" cy="-9.5" r="2.2" fill="oklch(0.72 0.10 162)" opacity="0.7" transform="rotate(-20)"/>
    <circle cx="-20" cy="9.5" r="2.2" fill="oklch(0.72 0.10 162)" opacity="0.7" transform="rotate(-20)"/>
    <circle cx="0" cy="-11" r="2" fill="oklch(0.72 0.10 162)" opacity="0.6" transform="rotate(-20)"/>
    <circle cx="0" cy="11" r="2" fill="oklch(0.72 0.10 162)" opacity="0.6" transform="rotate(-20)"/>
    <!-- Atmosphere -->
    <circle r="22" fill="none" stroke="oklch(0.74 0.07 250)" stroke-width="0.5" opacity="0.12"/>
  </g>
</svg>
