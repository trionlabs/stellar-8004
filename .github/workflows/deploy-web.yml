name: Deploy Web
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @stellar8004/web check
      - run: pnpm --filter @stellar8004/web build
        env:
          PUBLIC_STELLAR_NETWORK: ${{ secrets.PUBLIC_STELLAR_NETWORK }}
          PUBLIC_STELLAR_RPC_URL: ${{ secrets.PUBLIC_STELLAR_RPC_URL }}
          PUBLIC_IDENTITY_REGISTRY: ${{ secrets.PUBLIC_IDENTITY_REGISTRY }}
          PUBLIC_REPUTATION_REGISTRY: ${{ secrets.PUBLIC_REPUTATION_REGISTRY }}
          PUBLIC_VALIDATION_REGISTRY: ${{ secrets.PUBLIC_VALIDATION_REGISTRY }}
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: apps/web
          command: pages deploy .svelte-kit/cloudflare --project-name=8004scan
