name: Deploy Webapp VPS (Supabase + Indexer)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'webapp/packages/indexer/**'
      - 'webapp/packages/sdk/src/core/config.ts'
      - 'webapp/supabase/migrations/**'
      - 'webapp/supabase/functions/**'
      - 'webapp/docker/docker-compose.supabase.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            REPO=/etc/dokploy/compose/trionlabs8004-supabase-ei13uw/code

            echo "=== Pulling latest code ==="
            cd "$REPO"
            git fetch origin main
            git reset --hard origin/main
            cd webapp

            # No host-side edge rebuild: the committed
            # supabase/functions/_shared/indexer/ copy IS the deployed artifact,
            # and CI enforces zero drift from packages/indexer/src
            # (ci.yml: `sync-indexer-to-shared.js --check`). So the `git reset
            # --hard` above already places the correct files — running the
            # generator here would only add a `node` dependency the VPS shell
            # does not have, breaking the deploy before migrations run.

            echo "=== Applying new migrations ==="
            docker exec trionlabs8004-db psql -U postgres -c \
              "CREATE TABLE IF NOT EXISTS schema_migrations (filename text PRIMARY KEY, applied_at timestamptz DEFAULT now());"

            # One-time drift reconcile: 037_mpp_column was applied to prod via an
            # earlier path but never recorded here, so the runner re-ran it and hit
            # "column already exists" / "cannot change return type". Its effects are
            # already present, so record it as applied (idempotent) to skip the
            # re-run and let the runner proceed to the genuinely-new 038-041.
            # Safe to remove once 037 is recorded on prod.
            docker exec trionlabs8004-db psql -U postgres -c \
              "INSERT INTO schema_migrations (filename) VALUES ('037_mpp_column.sql') ON CONFLICT DO NOTHING;"

            APPLIED=$(docker exec trionlabs8004-db psql -U postgres -tAc \
              "SELECT filename FROM schema_migrations;" 2>/dev/null)

            for f in supabase/migrations/*.sql; do
              NAME=$(basename "$f")
              if echo "$APPLIED" | grep -qxF "$NAME"; then
                echo "  $NAME - already applied"
                continue
              fi

              echo "  $NAME - applying..."
              if docker exec -i trionlabs8004-db psql -U postgres -v ON_ERROR_STOP=1 < "$f"; then
                docker exec trionlabs8004-db psql -U postgres -tAc \
                  "INSERT INTO schema_migrations (filename) VALUES ('$NAME') ON CONFLICT DO NOTHING;"
                echo "  $NAME - done"
              else
                echo "  $NAME - FAILED"
                exit 1
              fi
            done

            echo "=== Restarting edge runtime ==="
            docker restart trionlabs8004-edge-functions

            echo "=== Verifying indexer health ==="
            sleep 5
            docker logs trionlabs8004-edge-functions 2>&1 | tail -3

            echo "=== Deploy complete ==="
