name: Verify VPS Deploy (Dokploy health gate)

# This stack is deployed by Dokploy's own git-watch auto-deploy (it pulls main,
# runs `docker compose up` which applies migrations via the in-compose `migrate`
# service and recreates the edge runtime). This workflow does NOT deploy — a
# second deploy path racing Dokploy is exactly what caused the edge runtime to
# orphan its bind-mount and go down. Instead it WAITS for Dokploy's deploy of
# the pushed commit, then asserts the stack actually came up healthy, failing
# loudly if it didn't (the safety net that was missing during the outages).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'webapp/packages/indexer/**'
      - 'webapp/packages/sdk/src/core/config.ts'
      - 'webapp/supabase/migrations/**'
      - 'webapp/supabase/functions/**'
      - 'webapp/docker/docker-compose.supabase.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Dokploy deploy and verify health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          envs: GITHUB_SHA
          script: |
            set -uo pipefail
            REPO=/etc/dokploy/compose/trionlabs8004-supabase-ei13uw/code
            PROJECT=trionlabs8004-supabase-ei13uw
            TARGET_SHA="${GITHUB_SHA}"
            echo "=== Post-deploy health gate for ${TARGET_SHA} ==="

            # 1. Wait (up to 15 min) for Dokploy's git-watch to deploy this commit.
            DEPLOYED=0
            for i in $(seq 1 30); do
              CUR=$(git -C "$REPO" rev-parse HEAD 2>/dev/null || echo none)
              if [ "$CUR" = "$TARGET_SHA" ]; then
                echo "Dokploy deployed ${TARGET_SHA}"
                DEPLOYED=1
                break
              fi
              echo "  [$i/30] waiting for Dokploy to deploy ${TARGET_SHA} (current ${CUR})..."
              sleep 30
            done
            if [ "$DEPLOYED" != "1" ]; then
              echo "::error::Dokploy did not deploy ${TARGET_SHA} within 15 min. Is auto-deploy enabled?"
              exit 1
            fi

            # 2. Let the stack settle: functions-init sync + migrate + edge recreate.
            echo "=== Settling (90s) ==="
            sleep 90

            # 3. Migrations: migrate service exited cleanly AND every migration file
            #    is recorded (catches a new migration silently not applying).
            MIG_EXIT=$(docker inspect trionlabs8004-migrate --format '{{.State.ExitCode}}' 2>/dev/null || echo NA)
            if [ "$MIG_EXIT" != "0" ]; then
              echo "::error::migrate service did not exit cleanly (exit=${MIG_EXIT})"
              docker logs trionlabs8004-migrate 2>&1 | tail -20
              exit 1
            fi
            FILES=$(ls "$REPO"/webapp/supabase/migrations/*.sql 2>/dev/null | wc -l | tr -d ' ')
            ROWS=$(docker exec trionlabs8004-db psql -U postgres -tAc \
              "SELECT count(*) FROM schema_migrations;" 2>/dev/null | tr -d ' ')
            echo "migrations: ${FILES} files, ${ROWS} applied (migrate exit=0)"
            if [ "${FILES:-0}" -gt "${ROWS:-0}" ] 2>/dev/null; then
              echo "::error::migration files (${FILES}) exceed applied rows (${ROWS}) - a migration did not apply"
              exit 1
            fi

            # 4. Edge + indexer health, with retry to tolerate the stale-lock
            #    self-heal window (180s reaper) and post-recreate boot.
            HEALTHY=0
            for i in $(seq 1 12); do
              # NOT orphaned: the edge container must see its bind-mounted functions.
              FCOUNT=$(docker exec trionlabs8004-edge-functions sh -c 'ls /home/deno/functions 2>/dev/null | wc -l' 2>/dev/null | tr -d ' ')
              # Indexer making forward progress (honest liveness, under the 5-min bar).
              LAG=$(docker exec trionlabs8004-db psql -U postgres -tAc \
                "SELECT round(extract(epoch FROM now()-max(last_advanced_at))) FROM indexer_state;" 2>/dev/null | tr -d ' ')
              # No fresh edge 500s (the worker-boot-error signature of an orphan).
              E500=$(docker exec trionlabs8004-db psql -U postgres -tAc \
                "SELECT count(*) FROM net._http_response WHERE created > now() - interval '2 min' AND status_code = 500;" 2>/dev/null | tr -d ' ')
              echo "  [$i/12] functions=${FCOUNT:-?} lag=${LAG:-?}s recent_500s=${E500:-?}"
              if [ "${FCOUNT:-0}" -gt 0 ] 2>/dev/null && \
                 [ "${LAG:-99999}" -lt 300 ] 2>/dev/null && \
                 [ "${E500:-99999}" -eq 0 ] 2>/dev/null; then
                HEALTHY=1
                break
              fi
              sleep 30
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "::error::Edge/indexer unhealthy after deploy (functions=${FCOUNT} lag=${LAG}s 500s=${E500})."
              echo "Likely the orphaned-bind-mount regression. Recover with a Dokploy Redeploy, or:"
              echo "  docker compose -p ${PROJECT} -f docker/docker-compose.supabase.yml up -d --force-recreate --no-deps functions"
              docker logs trionlabs8004-edge-functions 2>&1 | tail -12
              exit 1
            fi

            echo "=== Health gate PASSED: migrations applied, edge serving, indexer advancing ==="
