name: Deploy Webapp VPS (Supabase + Indexer)

on:
  push:
    branches: [main]
    paths:
      - 'webapp/packages/indexer/**'
      - 'webapp/supabase/migrations/**'
      - 'webapp/supabase/functions/**'
      - 'webapp/docker/docker-compose.supabase.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -e
            REPO=/etc/dokploy/compose/stellar8004-supabase-q75szz/code

            echo "=== Pulling latest code ==="
            cd "$REPO"
            git pull origin main
            cd webapp

            echo "=== Rebuilding edge functions ==="
            bash scripts/build-edge-function.sh

            echo "=== Applying new migrations ==="
            docker exec s8004-db psql -U postgres -c \
              "CREATE TABLE IF NOT EXISTS schema_migrations (filename text PRIMARY KEY, applied_at timestamptz DEFAULT now());"

            # Try to claim the migration row first via INSERT ... ON CONFLICT
            # DO NOTHING. The RETURNING clause tells us whether we won the
            # claim. If two CI runs race for the same migration file, only
            # one wins; the other prints "already applied" and skips. This
            # makes the apply loop safe under concurrent deploys.
            for f in supabase/migrations/*.sql; do
              NAME=$(basename "$f")
              CLAIMED=$(docker exec s8004-db psql -U postgres -tAc \
                "INSERT INTO schema_migrations (filename) VALUES ('$NAME') ON CONFLICT (filename) DO NOTHING RETURNING 1;" \
                2>/dev/null || true)
              if [ -z "$CLAIMED" ]; then
                echo "  $NAME - already applied or claimed by concurrent deploy"
                continue
              fi

              echo "  $NAME - applying..."
              if ! docker exec -i s8004-db psql -U postgres -v ON_ERROR_STOP=1 < "$f"; then
                echo "  $NAME - APPLY FAILED, releasing claim"
                docker exec s8004-db psql -U postgres -c \
                  "DELETE FROM schema_migrations WHERE filename='$NAME';"
                exit 1
              fi
            done

            echo "=== Restarting edge runtime ==="
            docker restart s8004-edge-functions

            echo "=== Verifying indexer health ==="
            sleep 5
            docker logs s8004-edge-functions 2>&1 | tail -3

            echo "=== Deploy complete ==="
