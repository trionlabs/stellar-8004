name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32v1-none
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install stellar-cli
        run: cargo install --locked stellar-cli@25.2.0

      - name: Build WASM
        run: make build

      - name: Run tests
        run: make test

      - name: Check formatting
        run: cargo fmt --all -- --check

  webapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          # Read the version from the workspace package.json so it cannot
          # drift from the locally-pinned packageManager field.
          package_json_file: webapp/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: webapp/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @trionlabs/stellar8004 build
      - run: pnpm --filter @trionlabs/stellar8004 test
      - run: pnpm --filter @trionlabs/stellar8004 check
      - run: pnpm --filter @stellar8004/indexer test
      - run: pnpm --filter @stellar8004/indexer check
      - run: pnpm --filter @stellar8004/web check
